server:
  port: ${SERVER_PORT:8088}
  # 暴露公网服务时建议启用
  forward-headers-strategy: framework
  tomcat:
    max-connections: 2000
    max-threads: 400
    accept-count: 200
    connection-timeout: 30000
    # 限制请求体大小（防止大文件上传攻击）
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB

spring:
  application:
    name: salary-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:salary_management}?useUnicode=true&characterEncoding=UTF-8&useSSL=${DB_USE_SSL:false}&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# JWT 配置
jwt:
  # 生产环境务必通过环境变量 JWT_SECRET 覆盖
  secret: ${JWT_SECRET:${random.uuid}${random.uuid}}
  expiration: ${JWT_EXPIRATION:86400000}

# 应用配置
app:
  security:
    # 开发环境默认开启自助注册，生产环境通过 application-prod.yml 覆盖
    registration-enabled: ${REGISTRATION_ENABLED:true}
    # 仅首次初始化管理员时使用；生产环境必须通过环境变量提供
    initial-admin-password: ${INITIAL_ADMIN_PASSWORD:}
  cors:
    # 生产环境示例: https://salary.yourdomain.com,https://www.yourdomain.com
    # 开发环境: *
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    allowed-headers: "*"
    max-age: 3600
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    api-capacity: 120  # 普通接口每分钟最大请求数
    login-capacity: 10 # 登录接口每分钟最大请求数

# 日志
logging:
  level:
    com.salary: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  file:
    name: ${LOG_PATH:logs}/salary-management.log
    max-size: 50MB
    max-history: 30
